        :root {

            --text-light: #475569;

            --text-dark: #f8fafc;
            --text-light: #94a3b8;
            --accent-blue: #0ea5e9;
            --border-color: #1e293b;
        }

        ::-webkit-scrollbar { width: 10px; }
        ::-webkit-scrollbar-track { background: var(--bg-color); }
        ::-webkit-scrollbar-thumb { background: var(--accent-blue); border-radius: 5px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary-color); }

        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            scroll-behavior: smooth;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .app-header {
            background: linear-gradient(135deg, #001122, #003366, #0088cc);
            color: white;
            text-align: center;
            padding: 50px 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            border-bottom: 5px solid var(--primary-color);

        /* أدوات التحكم (Dashboard) */
        .dashboard {
            background: var(--card-bg);
            padding: 20px;
            margin: -30px auto 20px;
            width: 95%;
            max-width: 1300px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            border-top: 4px solid var(--accent-blue);
            gap: 15px;
        }

        .stats-container { display: flex; gap: 15px; }
        .stat-box {
            text-align: center; padding: 10px 15px; background: var(--bg-color);
            border-radius: 10px; border: 1px solid var(--border-color);
        }
        .stat-box span.num { display: block; font-size: 1.6rem; font-weight: 900; color: var(--accent-blue); }

        .filters { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; }
        .filters button {
            padding: 10px 20px; border: none; border-radius: 30px;
            background: var(--bg-color); color: var(--text-dark);
            font-weight: bold; cursor: pointer; border: 1px solid var(--border-color);
        }
        .filters button:hover, .filters button.active { background: var(--accent-blue); color: white; border-color: var(--accent-blue); }
        
        .action-btn { background: #10b981 !important; color: white !important; }
        .dark-btn { background: #334155 !important; color: white !important; }

        /* شريط البحث */
        .search-container { text-align: center; padding: 10px 20px 30px; }
        .search-container input {
            width: 100%; max-width: 700px; padding: 18px 25px; font-size: 1.1rem;

            background: var(--card-bg); color: var(--text-dark);
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.05);
        }
        .search-container input:focus { box-shadow: 0 5px 25px var(--primary-glow); border-color: var(--primary-color); }

        /* شبكة البطاقات */
        .cards-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px; padding: 20px 40px 60px; max-width: 1400px; margin: 0 auto; flex: 1;
        }

        .card {
            background: var(--card-bg); border-radius: 15px; padding: 30px 25px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.08); border-right: 6px solid var(--accent-blue);
            position: relative; opacity: 0; transform: translateY(30px);

        .card:hover { transform: translateY(-8px); box-shadow: 0 15px 30px var(--primary-glow); }

        .tag-action { color: #10b981; font-weight: bold; }

        .tag-cover { color: #f59e0b; font-weight: bold; }

        .content-placeholder { flex: 0; }

            left: 0;

            height: 100%;

        }

            font-weight: 900; 
            fill: var(--primary-color, #E5C158); 
            letter-spacing: 4px; 
            text-transform: uppercase; 
        }

        .center-prayer {
            position: relative; 
            width: 340px; 
            text-align: center; 
            font-size: 2.2rem; 
            font-weight: 900; 
            color: var(--primary-color, #E5C158);

            flex-direction: column;

        }

        .center-prayer::before { 
            content: "🦅"; 
            font-size: 2.2rem; 
            margin-bottom: 15px; 
            opacity: 0.95; 
            filter: drop-shadow(0 0 10px var(--primary-glow, rgba(229, 193, 88, 0.4))); 
        }

        .center-prayer::after { 
            content: "🦅"; 
            font-size: 2.2rem; 
            margin-top: 15px; 
            opacity: 0.95; 
            filter: drop-shadow(0 0 10px var(--primary-glow, rgba(229, 193, 88, 0.4))); 
            transform: scaleX(-1); 
        }
        /* ========================================================= */

        @media print {
            body { background: white; }
            .app-header, .dashboard, .search-container, .footer-wrapper { display: none; }
            .cards-grid { display: block; }
            .card { break-inside: avoid; margin-bottom: 20px; opacity: 1; transform: none; border: 1px solid #000; box-shadow: none; color: black; }
            .card h2 { color: black; }
        }
    </style>
</head>

            "إجبار الطلاب على الدروس الخصوصية واستغلال مرافق ومقاعد المدرسة لتنفيذها.",
            "التستر على وقائع عنف وتحرش جسيم داخل الحرم المدرسي وعدم إبلاغ الشرطة المختصة.",
            "رفض إخلاء الطرف وتسليم العهدة المالية والمخزنية بعد صدور قرار الإحالة للمعاش.",
            "الغياب المتصل لأكثر من 15 يوماً دون إذن وتجاوز الإجازات الاعتيادية والمرضية المبررة.",
            "الاحتفاظ بدفاتر وسجلات حكومية سرية داخل سيارة الموظف أو منزله وتفريغها من محتواها.",
            "توجيه مأموريات وخطوط سير وهمية للموظفين للتهرب من التواجد بمقر العمل الرسمي.",
            "إنشاء صفحات وهمية على منصات التواصل الاجتماعي للإساءة لقيادات التعليم وابتزازهم.",
            "الامتناع عن تنفيذ الأحكام القضائية الصادرة لصالح المعلمين المتعلقة بالتسويات الوظيفية.",
            "تشغيل عمالة غير رسمية (بدون عقود) داخل المدرسة مما يهدد أمن وسلامة المنشأة.",
            "رفض التعاون مع لجان التفتيش المالي والإداري وإعاقة وصولهم للمستندات المطلوبة.",
            "تعديل المسمى الوظيفي لمعلمين في قواعد البيانات دون وجود قرار أو سند وزاري.",
            "استغلال سيارات الإدارة التعليمية ومحروقاتها في أغراض ومساعي شخصية خالصة."
        ];

        const realCases = [
            "⚖️ حكم المحكمة التأديبية العليا، الدعوى رقم 154 لسنة 62 ق.",
            "⚖️ قرار إحالة النيابة الإدارية رقم 412 لسنة 2022 للتعليم.",
            "⚖️ حكم المحكمة الإدارية العليا في الطعن 1024 لسنة 65 ق.ع.",
            "⚖️ قرار وزير التربية والتعليم رقم 34 لسنة 2021 بالإيقاف.",
            "⚖️ النيابة العامة، قيد جنايات أموال عامة رقم 88 لسنة 2020.",
            "⚖️ المحكمة التأديبية لوزارة التربية والتعليم، قضية رقم 77 لسنة 60 ق."
        ];

        const allCardsData = [];
        let currentId = 1;

        // دالة توليد بطاقات محكمة الصياغة وغير مكررة
        function generateData(baseArray, category, typeLabel, targetCount) {
            for(let i = 0; i < targetCount; i++) {
                let violationText = baseArray[i % baseArray.length];
                
                // إضافة متغيرات مكانية لضمان عدم التكرار إذا تجاوزنا طول المصفوفة الأساسية
                if(i >= baseArray.length) {
                    const locations = ["(بالتعليم الفني المزدوج)", "(بإحدى مدارس اللغات)", "(بديوان الإدارة التعليمية)", "(بالمدرسة الإعدادية المشتركة)", "(باللجنة الإشرافية)"];
                    violationText += " " + locations[i % locations.length];
                }

                let law = "قانون الخدمة المدنية 81 لسنة 2016 ولائحته التنفيذية.";
                let penalty = "الخصم من الراتب وتأجيل الترقية.";
                let action = "الإحالة العاجلة للشئون القانونية.";
                let coverUp = "المساءلة التضامنية واعتباره شريكاً في المخالفة بالتستر وإعاقة العدالة.";

                if (category === "exams") {
                    law = "قانون مكافحة الإخلال بالامتحانات رقم 205 لسنة 2020، والقرارات الوزارية لأعمال الكنترول.";
                    penalty = "الحرمان من أعمال الامتحانات 5 سنوات، العزل، أو السجن والغرامة من 100 لـ 200 ألف جنيه.";
                    action = "الإيقاف الفوري عن العمل واستبعاد من تشكيل الكنترول والإحالة للنيابة العامة.";
                } else if (category === "financial") {
                    law = "المادة 112 و 113 من قانون العقوبات، وقانون تنظيم التعاقدات رقم 182 لسنة 2018.";
                    penalty = "العزل من الوظيفة، الحبس الاحتياطي، ورد المبالغ المختلسة أضعافاً لوزارة المالية.";
                    action = "إيقاف 3 أشهر وتشكيل لجنة جرد وإحالة القضية لنيابة الأموال العامة.";
                }

                allCardsData.push({
                    id: currentId++,
                    category: category,
                    typeLabel: typeLabel,
                    violation: violationText,
                    law: law,
                    action: action,
                    penalty: penalty,
                    coverUp: coverUp,
                    realCase: realCases[currentId % realCases.length]
                });
            }
        }

        // توليد الـ 100 حالة
        generateData(examBases, 'exams', 'امتحانات وكنترول', 34);
        generateData(financialBases, 'financial', 'مخالفة مالية', 33);
        generateData(adminBases, 'admin', 'مخالفة إدارية', 33);

        const grid = document.getElementById('cardsGrid');

        // عرض البطاقات
        function renderCards(data) {
            grid.innerHTML = '';
            data.forEach((card, index) => {
                let badgeClass = card.category;
                let badgeIcon = card.category === 'exams' ? '📝' : (card.category === 'financial' ? '💰' : '👔');
                
                const div = document.createElement('div');
                div.className = 'card';
                div.style.transitionDelay = `${(index % 12) * 0.05}s`;

                div.innerHTML = `
                    <div class="card-number">#${card.id}</div>
                    <div class="card-badge ${badgeClass}">${badgeIcon} ${card.typeLabel}</div>
                    <h2>🚨 المخالفة: ${card.violation}</h2>
                    <div class="card-item"><span class="label">📜 السند القانوني:</span> <span class="tag-legal">${card.law}</span></div>
                    <div class="card-item"><span class="label">⚖️ الإجراء الرادع:</span> <span class="tag-action">${card.action}</span></div>
                    <div class="card-item"><span class="label">🛑 الجزاء الفعلي:</span> <span class="tag-penalty">${card.penalty}</span></div>
                    <div class="card-item"><span class="label">👁️ عاقبة التستر:</span> <span class="tag-cover">${card.coverUp}</span></div>
                    <div class="real-case">${card.realCase}</div>
                `;
                grid.appendChild(div);
            });
            
            // مؤثر الظهور
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('visible'); });
            }, { threshold: 0.1 });
            document.querySelectorAll('.card').forEach(c => observer.observe(c));
        }

        // فلترة الأقسام
        function filterCategory(cat) {
            document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
            event.target.classList.add('active');
            const filtered = cat === 'all' ? allCardsData : allCardsData.filter(c => c.category === cat);
            renderCards(filtered);
        }

        // بحث متقدم
        function searchCards() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allCardsData.filter(c => 
                c.violation.toLowerCase().includes(query) || 
                c.realCase.toLowerCase().includes(query) ||
                c.law.toLowerCase().includes(query)
            );
            renderCards(filtered);
        }

        // الوضع الداكن (Dark Mode)
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
        }

        // تصدير كملف إكسيل/CSV
        function exportToCSV() {
            let csvContent = "data:text/csv;charset=utf-8,\uFEFF"; // لدعم اللغة العربية
            csvContent += "رقم,التصنيف,المخالفة,السند القانوني,الإجراء الفوري,الجزاء الفعلي,عاقبة التستر,رقم القضية (حكم تأديبي)\n";
            
            allCardsData.forEach(function(row) {
                let cleanViolation = row.violation.replace(/,/g, "،");
                let cleanLaw = row.law.replace(/,/g, "،");
                let rowData = `${row.id},${row.typeLabel},${cleanViolation},${cleanLaw},${row.action},${row.penalty},${row.coverUp},${row.realCase.replace(/,/g, "،")}`;
                csvContent += rowData + "\n";
            });

            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", "مخالفات_الرادع_المنيع.csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }

        // التهيئة
        window.onload = () => {
            renderCards(allCardsData);
            setTimeout(() => document.querySelectorAll('.card').forEach(c => c.classList.add('visible')), 50);
        };
    </script>
</body>
</html>
